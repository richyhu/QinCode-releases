/* ────────────────────────────────────────────────────────────────────────────────────────
   1. CSS CUSTOM PROPERTIES (DESIGN TOKENS)
   ──────────────────────────────────────────────────────────────────────────────────────── */

:root {
    /* ─── Color Palette: Light Mode — Error state warm neutrals ─── */
    --color-bg-page: #fafaf9;
    --color-bg-surface: #ffffff;
    --color-bg-elevated: #f5f5f4;
    --color-text-primary: #1c1917;
    --color-text-secondary: #57534e;
    --color-text-tertiary: #78716c;
    --color-text-quaternary: #a8a29e;
    --color-text-muted: #d6d3d1;
    --color-text-inverse: #ffffff;
    
    /* Error accent: warm red-orange, not harsh bright red */
    --color-accent: #dc2626;
    --color-accent-rgb: 220, 38, 38;
    --color-accent-light: #ef4444;
    --color-accent-dark: #b91c1c;
    --color-accent-dim: rgba(220, 38, 38, 0.06);
    --color-accent-soft: rgba(220, 38, 38, 0.1);
    --color-accent-glow: rgba(220, 38, 38, 0.15);
    --color-accent-pulse: rgba(220, 38, 38, 0.3);
    
    --color-line-default: rgba(0, 0, 0, 0.04);
    --color-line-strong: rgba(0, 0, 0, 0.08);
    --color-line-accent: rgba(220, 38, 38, 0.2);
    
    --color-shadow-sm: rgba(0, 0, 0, 0.02);
    --color-shadow-md: rgba(0, 0, 0, 0.04);
    --color-shadow-lg: rgba(0, 0, 0, 0.06);
    --color-shadow-xl: rgba(0, 0, 0, 0.1);
    --color-shadow-glow: rgba(220, 38, 38, 0.08);
    
    /* ─── Typography Scale — extremely refined ─── */
    --font-family-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-family-mono: "SF Mono", "SFMono-Regular", "Fira Code", "Cascadia Code", "Roboto Mono", Menlo, Monaco, Consolas, monospace;
    
    --font-size-hero: clamp(2.25rem, 5vw, 2.75rem);
    --font-size-title: clamp(1.75rem, 4vw, 2.25rem);
    --font-size-subtitle: clamp(1rem, 2.5vw, 1.125rem);
    --font-size-body: clamp(0.875rem, 2vw, 1rem);
    --font-size-small: clamp(0.8125rem, 1.8vw, 0.9375rem);
    --font-size-caption: clamp(0.75rem, 1.5vw, 0.8125rem);
    --font-size-mono: clamp(0.75rem, 1.8vw, 0.8125rem);
    
    --line-height-tight: 1.1;
    --line-height-snug: 1.25;
    --line-height-normal: 1.5;
    --line-height-relaxed: 1.65;
    --line-height-loose: 1.8;
    
    --letter-spacing-tighter: -0.04em;
    --letter-spacing-tight: -0.025em;
    --letter-spacing-normal: -0.01em;
    --letter-spacing-wide: 0.005em;
    --letter-spacing-wider: 0.02em;
    
    --font-weight-normal: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-black: 800;
    
    /* ─── Spacing Scale (4px base) — extremely refined ─── */
    --space-0: 0px;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    --space-16: 64px;
    --space-20: 80px;
    --space-24: 96px;
    --space-32: 128px;
    --space-48: 192px;
    
    /* ─── Border Radius Scale ─── */
    --radius-none: 0px;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --radius-2xl: 24px;
    --radius-3xl: 32px;
    --radius-full: 9999px;
    
    /* ─── Animation Timing — extremely refined, no bouncy effects ─── */
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    --ease-out-sine: cubic-bezier(0.39, 0.575, 0.565, 1);
    --ease-in-out-sine: cubic-bezier(0.37, 0, 0.63, 1);
    --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
    
    --duration-instant: 0.1s;
    --duration-fast: 0.2s;
    --duration-normal: 0.3s;
    --duration-slow: 0.5s;
    --duration-slower: 0.7s;
    --duration-slowest: 1.0s;
    --duration-stagger: 0.08s;
    
    /* ─── Z-Index Scale ─── */
    --z-background: -1;
    --z-base: 0;
    --z-elevated: 10;
    --z-overlay: 100;
    --z-modal: 1000;
}

@media (prefers-color-scheme: dark) {

        --color-bg-page: #0c0c0c;
        --color-bg-surface: #141414;
        --color-bg-elevated: #1a1a1a;
        --color-text-primary: #f5f5f5;
        --color-text-secondary: #a3a3a3;
        --color-text-tertiary: #737373;
        --color-text-quaternary: #525252;
        --color-text-muted: #404040;
        --color-text-inverse: #0a0a0a;
        
        /* Error accent: softer in dark mode */
        --color-accent: #f87171;
        --color-accent-rgb: 248, 113, 113;
        --color-accent-light: #fca5a5;
        --color-accent-dark: #ef4444;
        --color-accent-dim: rgba(248, 113, 113, 0.05);
        --color-accent-soft: rgba(248, 113, 113, 0.08);
        --color-accent-glow: rgba(248, 113, 113, 0.1);
        --color-accent-pulse: rgba(248, 113, 113, 0.25);
        
        --color-line-default: rgba(255, 255, 255, 0.04);
        --color-line-strong: rgba(255, 255, 255, 0.08);
        --color-line-accent: rgba(248, 113, 113, 0.2);
        
        --color-shadow-sm: rgba(0, 0, 0, 0.15);
        --color-shadow-md: rgba(0, 0, 0, 0.25);
        --color-shadow-lg: rgba(0, 0, 0, 0.35);
        --color-shadow-xl: rgba(0, 0, 0, 0.45);
        --color-shadow-glow: rgba(248, 113, 113, 0.08);
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   2. CSS RESET & NORMALIZE
   ──────────────────────────────────────────────────────────────────────────────────────── */

*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

html {
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: var(--font-family-sans);
    font-size: var(--font-size-body);
    line-height: var(--line-height-normal);
    color: var(--color-text-primary);
    background-color: var(--color-bg-page);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    position: relative;
}

*:focus {
    outline: none;
}

*:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 3px;
    border-radius: var(--radius-sm);
}

::selection {
    background-color: var(--color-accent-soft);
    color: var(--color-text-primary);
}

::-moz-selection {
    background-color: var(--color-accent-soft);
    color: var(--color-text-primary);
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: var(--color-line-strong);
    border-radius: var(--radius-full);
    border: 1px solid transparent;
    background-clip: padding-box;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--color-text-tertiary);
}

::-webkit-scrollbar-thumb:active {
    background: var(--color-text-secondary);
}

::-webkit-scrollbar-corner {
    background: transparent;
}

* {
    scrollbar-width: thin;
    scrollbar-color: var(--color-line-strong) transparent;
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   3. BASE TYPOGRAPHY & LAYOUT
   ──────────────────────────────────────────────────────────────────────────────────────── */

h1, h2, h3, h4, h5, h6 {
    font-weight: var(--font-weight-bold);
    line-height: var(--line-height-tight);
    letter-spacing: var(--letter-spacing-tight);
    color: var(--color-text-primary);
}

p {
    margin: 0;
}

a {
    color: inherit;
    text-decoration: none;
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   4. AMBIENT BACKGROUND (extremely subtle — one soft orb only, no grid, no noise)
   ──────────────────────────────────────────────────────────────────────────────────────── */

.ambient {
    position: fixed;
    inset: 0;
    z-index: var(--z-background);
    pointer-events: none;
    overflow: hidden;
    isolation: isolate;
}

.ambient .orb {
    position: absolute;
    border-radius: var(--radius-full);
    filter: blur(120px);
    will-change: transform;
    pointer-events: none;
}

.ambient .orb-primary {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--color-accent-glow), transparent 70%);
    top: -150px;
    right: -100px;
    opacity: 0.25;
    animation: orbDrift 25s var(--ease-in-out-sine) infinite;
}

/* No secondary or tertiary orbs — keep it extremely clean like Claude */
/* No grid overlay */
/* No noise overlay */

/* ────────────────────────────────────────────────────────────────────────────────────────
   5. MAIN CONTAINER
   ──────────────────────────────────────────────────────────────────────────────────────── */

.container {
    position: relative;
    z-index: var(--z-base);
    width: 100%;
    max-width: 440px;
    text-align: center;
    padding: var(--space-8);
    animation: containerReveal 1.0s var(--ease-out-expo) forwards;
    opacity: 0;
    transform: translateY(16px);
    will-change: transform, opacity;
}

@keyframes containerReveal {
    0% {
        opacity: 0;
        transform: translateY(16px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   6. ERROR ICON (clean, single — X mark in outlined circle, no solid fill, no rings)
   ──────────────────────────────────────────────────────────────────────────────────────── */

.icon-section {
    position: relative;
    display: inline-block;
    margin-bottom: var(--space-8);
}

.icon-wrap {
    position: relative;
    width: 72px;
    height: 72px;
    border-radius: var(--radius-full);
    border: 1.5px solid var(--color-accent);
    background: var(--color-accent-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    animation: iconReveal 0.7s var(--ease-out-expo) 0.2s both;
    will-change: transform, opacity;
    transition: transform var(--duration-fast) var(--ease-out-sine),
                box-shadow var(--duration-fast) var(--ease-out-sine),
                border-color var(--duration-fast) var(--ease-out-sine);
}

.icon-wrap:hover {
    transform: translateY(-2px);
    border-color: var(--color-accent-light);
    box-shadow: 0 4px 20px var(--color-shadow-glow);
}

.icon-wrap svg {
    width: 28px;
    height: 28px;
    color: var(--color-accent);
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: strokeDraw 0.5s var(--ease-out-expo) 0.5s forwards;
}

/* No rings, no ripples, no glow rings — keep it extremely clean like Claude */

/* ────────────────────────────────────────────────────────────────────────────────────────
   7. TYPOGRAPHY
   ──────────────────────────────────────────────────────────────────────────────────────── */

.title {
    font-size: var(--font-size-hero);
    font-weight: var(--font-weight-bold);
    letter-spacing: var(--letter-spacing-tighter);
    line-height: var(--line-height-tight);
    color: var(--color-text-primary);
    margin-bottom: var(--space-3);
    animation: fadeSlideUp 0.6s var(--ease-out-expo) 0.45s both;
    will-change: transform, opacity;
}

.subtitle {
    font-size: var(--font-size-subtitle);
    font-weight: var(--font-weight-normal);
    line-height: var(--line-height-relaxed);
    color: var(--color-text-secondary);
    letter-spacing: var(--letter-spacing-normal);
    animation: fadeSlideUp 0.6s var(--ease-out-expo) 0.55s both;
    will-change: transform, opacity;
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   8. FOOTER HINT (extremely subtle, no badges, no dividers, no status indicators)
   ──────────────────────────────────────────────────────────────────────────────────────── */

.footer-hint {
    margin-top: var(--space-12);
    font-size: var(--font-size-caption);
    color: var(--color-text-quaternary);
    letter-spacing: var(--letter-spacing-wide);
    animation: fadeSlideUp 0.5s var(--ease-out-expo) 0.75s both;
    transition: color var(--duration-fast) var(--ease-out-sine);
}

.footer-hint:hover {
    color: var(--color-text-tertiary);
}

/* No status badge, no divider, no "已连接" text, no "auth-ok" code block — all removed */
/* No command palette, no keyboard shortcut hint — all removed */

/* ────────────────────────────────────────────────────────────────────────────────────────
   12. REDUCED MOTION SUPPORT
   ──────────────────────────────────────────────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
    }
    
    .ambient .orb {
        animation: none !important;
    }
    
    .icon-wrap svg {
        stroke-dashoffset: 0 !important;
    }
    
    .container {
        opacity: 1 !important;
        transform: none !important;
    }
    
    .title,
    .subtitle,
    .footer-hint {
        opacity: 1 !important;
        transform: none !important;
        animation: none !important;
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   13. HIGH CONTRAST MODE
   ──────────────────────────────────────────────────────────────────────────────────────── */

@media (prefers-contrast: high) {
    :root {
        --color-line-default: rgba(0, 0, 0, 0.25);
        --color-line-strong: rgba(0, 0, 0, 0.4);
        --color-line-accent: rgba(220, 38, 38, 0.5);
        --color-accent-dim: rgba(220, 38, 38, 0.2);
        --color-accent-soft: rgba(220, 38, 38, 0.25);
        --color-accent-glow: rgba(220, 38, 38, 0.3);
    }
    
    .icon-wrap {
        box-shadow: none;
        border-width: 2px;
    }
}

@media (prefers-contrast: high) and (prefers-color-scheme: dark) {
    :root {
        --color-line-default: rgba(255, 255, 255, 0.25);
        --color-line-strong: rgba(255, 255, 255, 0.4);
        --color-line-accent: rgba(248, 113, 113, 0.5);
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   14. PRINT STYLES
   ──────────────────────────────────────────────────────────────────────────────────────── */

@media print {
    .ambient {
        display: none !important;
    }
    
    body {
        background: #ffffff !important;
        color: #000000 !important;
        height: auto !important;
    }
    
    .container {
        max-width: 100%;
        padding: 20px;
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
    }
    
    .icon-wrap {
        border: 2px solid #dc2626 !important;
        background: transparent !important;
        box-shadow: none !important;
    }
    
    .icon-wrap svg {
        color: #dc2626 !important;
    }
    
    .title,
    .subtitle,
    .footer-hint {
        color: #000000 !important;
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   15. BROWSER-SPECIFIC FIXES
   ──────────────────────────────────────────────────────────────────────────────────────── */

@supports (-webkit-touch-callout: none) {
    body {
        height: -webkit-fill-available;
    }
    
    html {
        height: -webkit-fill-available;
    }
}

@-moz-document url-prefix() {
    .ambient .orb {
        filter: blur(100px) opacity(0.18);
    }
    
    ::-webkit-scrollbar {
        width: 10px;
    }
}

@supports (contain: paint) {
    .ambient {
        contain: paint;
    }
}

@supports (padding: max(0px)) {
    .container {
        padding-left: max(var(--space-8), env(safe-area-inset-left));
        padding-right: max(var(--space-8), env(safe-area-inset-right));
    }
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   16. SCROLLBAR STYLING (EXTENDED)
   ──────────────────────────────────────────────────────────────────────────────────────── */

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: var(--color-line-strong);
    border-radius: var(--radius-full);
    border: 1px solid transparent;
    background-clip: padding-box;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--color-text-tertiary);
}

::-webkit-scrollbar-thumb:active {
    background: var(--color-text-secondary);
}

::-webkit-scrollbar-corner {
    background: transparent;
}

::-webkit-scrollbar-horizontal {
    height: 4px;
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   17. SELECTION & FOCUS STATES (EXTENDED)
   ──────────────────────────────────────────────────────────────────────────────────────── */

::selection {
    background-color: var(--color-accent-soft);
    color: var(--color-text-primary);
}

::-moz-selection {
    background-color: var(--color-accent-soft);
    color: var(--color-text-primary);
}

*:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 3px;
    border-radius: var(--radius-sm);
}

*:focus:not(:focus-visible) {
    outline: none;
}

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible,
[tabindex]:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

/* ────────────────────────────────────────────────────────────────────────────────────────
   18. DARK MODE SPECIFICS

}

}

.container {

svg {

    height: auto;
}

@supports not (display: grid) {

        max-width: 440px;

.title,
.subtitle,
.footer-hint {

<script>
/* ════════════════════════════════════════════════════════════════════════════════════════
   QinCode Auth Callback — Failure Scripts
   ════════════════════════════════════════════════════════════════════════════════════════ */

(function () {
    "use strict";

    // ─── Configuration ───
    const CONFIG = {
        parallaxDelay: 1500,
        parallaxSmoothing: 0.05,
        parallaxMaxOffset: 2,
        consoleWelcome: true
    };

    // ─── DOM Cache ───
    const DOM = {
        container: document.querySelector(".container"),
        title: document.querySelector(".title"),
        subtitle: document.querySelector(".subtitle"),
        footerHint: document.querySelector(".footer-hint"),
        iconWrap: document.querySelector(".icon-wrap")
    };

    // ─── Keyboard Shortcuts ───
    function initKeyboard() {
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" || (e.metaKey && e.key === "w")) {
                e.preventDefault();
                window.close();
            }
        });
    }

    // ─── Mouse Parallax Effect ───
    function initParallax() {
        if (!DOM.container) return;
        
        const isFinePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        if (!isFinePointer) return;
        
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let rafId = null;
        let isActive = false;
        
        function onMouseMove(e) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            targetX = ((e.clientX - cx) / cx) * CONFIG.parallaxMaxOffset;
            targetY = ((e.clientY - cy) / cy) * CONFIG.parallaxMaxOffset;
        }
        
        function onMouseLeave() {
            targetX = 0;
            targetY = 0;
        }
        
        function animate() {
            currentX += (targetX - currentX) * CONFIG.parallaxSmoothing;
            currentY += (targetY - currentY) * CONFIG.parallaxSmoothing;
            
            const threshold = 0.01;
            if (Math.abs(currentX) > threshold || Math.abs(currentY) > threshold) {
                DOM.container.style.transform = "translate(" + currentX.toFixed(2) + "px, " + currentY.toFixed(2) + "px)";
            }
            
            rafId = requestAnimationFrame(animate);
        }
        
        document.addEventListener("mousemove", onMouseMove);
        document.addEventListener("mouseleave", onMouseLeave);
        
        setTimeout(function () {
            isActive = true;
            animate();
        }, CONFIG.parallaxDelay);
        
        document.addEventListener("visibilitychange", function () {
            if (document.hidden && rafId) {
                cancelAnimationFrame(rafId);
                isActive = false;
            } else if (!document.hidden && !isActive) {
                isActive = true;
                animate();
            }
        });
    }

    // ─── Touch Device Detection ───
    function initTouchDetection() {
        const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        if (isTouch) {
            document.body.classList.add("touch-device");
        }
    }

    // ─── Page Visibility API ───
    function initVisibility() {
        document.addEventListener("visibilitychange", function () {
            document.title = document.hidden ? "QinCode — 失败" : "登录失败 — QinCode";
        });
    }

    // ─── Console Welcome ───
    function initConsole() {
        if (!CONFIG.consoleWelcome) return;
        if (typeof console === "undefined") return;
        
        console.log(
            "%c QinCode %c Auth Failed ",
            "background: #dc2626; color: #fff; padding: 4px 10px; border-radius: 4px 0 0 4px; font-weight: 700; font-size: 12px;",
            "background: #111; color: #fff; padding: 4px 10px; border-radius: 0 4px 4px 0; font-size: 12px;"
        );
        console.log("%cAuthorization code not received. Please retry in terminal.", "color: #dc2626; font-size: 11px;");
        
        if (console.info) {
            console.info("QinCode Auth Callback Failure v1 loaded.");
        }
    }

    // ─── No-JS Fallback Detection ───
    function initNoJsFallback() {
        document.documentElement.classList.remove("no-js");
    }

    // ─── Intersection Observer for Performance ───
    function initObserver() {
        if (!window.IntersectionObserver) return;
        
        const options = {
            threshold: 0.1,
            rootMargin: "0px"
        };
        
        const observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    entry.target.style.willChange = "auto";
                }
            });
        }, options);
        
        if (DOM.title) observer.observe(DOM.title);
        if (DOM.subtitle) observer.observe(DOM.subtitle);
        if (DOM.footerHint) observer.observe(DOM.footerHint);
        if (DOM.iconWrap) observer.observe(DOM.iconWrap);
    }

    // ─── Initialize All Modules ───
    function init() {
        initKeyboard();
        initParallax();
        initTouchDetection();
        initVisibility();
        initConsole();
        initNoJsFallback();
        initObserver();
    }

    // ─── Start ───
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
